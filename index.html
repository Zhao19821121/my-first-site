<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的第一个 GitHub 网站</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: grid;
      min-height: 100vh;
      place-items: center;
    }

    main {
      max-width: 720px;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
    }

    .tag {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main>
    <h1>你好，GitHub Pages!</h1>
    <p>这是我部署到 GitHub 的第一个网站。</p>
    <p>如果你能看到这个页面，说明部署成功了。</p>
    <span class="tag">My First Site</span>
  </main>
</body>
</html>
